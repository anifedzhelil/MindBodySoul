<div class="header">
    <div class="logo">
        <img src="assets/images/logo.png" [routerLink]="'/'" />
    </div>
    <div class="content">
        <div class="navbar">
            <nav>
                <ul>
                    <li>
                        <a [routerLink]="'/'" (click)="toggleMenu()">Начална страница</a>
                    </li>
                    <li>
                        <a class="size" [routerLink]="'/categories'" (click)="toggleMenu()">Категории</a>
                    </li>
                    <li>
                        <a [routerLink]="'/articles'" (click)="toggleMenu()">Статии</a>
                    </li>
                    <ng-container *ngIf="
              user?.userName !== undefined && user?.roles?.includes('Writer')
            ">
                        <li><a [routerLink]="'/admin'" (click)="toggleMenu()">Админ</a></li>
                    </ng-container>
                    <li>
                        <a [routerLink]="'/contacts'" (click)="toggleMenu()">Контакти</a>
                    </li>
                </ul>
            </nav>
        </div>
        <div class="search">
            <form>
                <input type="search" #searchInput placeholder="Търсене..." />
                <fa-icon [icon]="faSearch" (click)="onSearch(searchInput.value)"></fa-icon>
            </form>
        </div>
        <div class="login">
            <ng-container *ngIf="user === undefined; else showLogout">
                <a [routerLink]="'/login'">Вход</a>
            </ng-container>
            <ng-template #showLogout>
                <a name="username" id="username">{{ this.user?.userName }}</a>
                <a (click)="onLogout()">
                    <fa-icon [icon]="faRightFromBracket"></fa-icon>
                    Изход</a>
            </ng-template>
        </div>
    </div>
</div>
