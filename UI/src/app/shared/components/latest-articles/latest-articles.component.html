
<div class="wrapper">
  <button class="arrow left" [disabled]="currentIndex === 0" (click)="getArticles(currentIndex-1)"><fa-icon [icon]="faCaretLeft" size="2x"></fa-icon></button>
  <div class="container">
      <a [routerLink]="['/articles/articles-details', article.id]" class="card" *ngFor="let article of visibleArticles">
     <img [src]="article.imageUrl" [alt]="article.title">
          <div class="card-body">
            <h3>{{ article.title }}</h3>
            <p innerHTML="{{ article.excerpt }}"></p>
          </div>
    </a>
  </div>
  <button class="arrow right" [disabled]="currentIndex >= articles.length - 4" (click)="getArticles(currentIndex+1)"><fa-icon [icon]="faCaretRight" size="2x"></fa-icon></button>
</div>
