
<div class="wrapper">
  <button class="arrow left" (click)="getArticles(currentIndex+1)"><fa-icon [icon]="faCaretLeft" size="2x"></fa-icon></button>
  <div class="container">
    <a [routerLink]="['/articles', article.id]" class="card" *ngFor="let article of visibleArticles">
        <img [src]="article.imageUrl" [alt]="article.title">
          <div class="card-body">
            <h3>{{ article.title }}</h3>
            <p>{{ article.excerpt }}</p>
          </div>
    </a>
  </div>
  <button class="arrow right" (click)="getArticles(currentIndex-1)"><fa-icon [icon]="faCaretRight" size="2x"></fa-icon></button>
</div>
