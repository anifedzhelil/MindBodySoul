<div class="form-container">
  <ng-container *ngIf="subCategory; else notFound">
    <form #form="ngForm" (ngSubmit)="onFormSubmit(form)">
      <h2>Добави подкатегория</h2>
      <p class="field">
        <label for="name">Име</label>
        <input type="text" id="subCategoryName" class="form-control" name="subCategoryName"
          [(ngModel)]="subCategory.name" #inputSubCategoryName="ngModel" required />
      </p>
      <ng-container *ngIf="inputSubCategoryName.touched">
        <p *ngIf="inputSubCategoryName?.errors?.['required']" class="error">
          Въведете име на подкатегория!
        </p>
      </ng-container>

      <p class="field">
        <label for="category">Категория</label>
        <select name="category" id="category" required [(ngModel)]="subCategory.categoryId" #selectCategory="ngModel">
          <option value="">---Избери категория---</option>
          <option *ngFor="let category of categories$ | async" [value]="category.id">
            {{ category.name }}
          </option>
        </select>
      </p>
      <ng-container *ngIf="selectCategory.touched">
        <p class="error" *ngIf="selectCategory.errors?.['required']">
          Изберете подкатегория!
        </p>
      </ng-container>
      <p class="field">
        <label for="image">Икона</label>
        <app-icon-picker [initialIcon]="subCategory.icon" (iconSelected)="subCategory.icon = $event">
        </app-icon-picker>
      </p>
      <p class="field">
        <input type="submit" value="Запази" />
      </p>
      <p class="field error" *ngIf="form.invalid">
        <span>Въведете валидни данни!</span>
      </p>
    </form>
  </ng-container>
  <ng-template #notFound>
    <div class="container">
      <div class="not-found">Подкатегорията не е намерана!</div>
    </div>
  </ng-template>
</div>
