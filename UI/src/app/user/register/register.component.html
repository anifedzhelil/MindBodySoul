<div class="form-container">
  <form [formGroup]="form" (ngSubmit)="register()">
    <h2>Регистрация</h2>
    <div class="field">
      <label for="userName">Потребителско име</label>
      <input type="text" id="userName" name="userName" formControlName="userName" />
    </div>
    <ng-container *ngIf="userName?.touched">
      <div class="error" *ngIf="userNameErrors?.['required']">
        Въведете потребителско име!
      </div>
    </ng-container>

    <div class="field">
      <label for="email">Имейл</label>
      <input type="text" id="email" name="email" formControlName="email" />
    </div>

    <ng-container *ngIf="email?.touched">
      <div class="error" *ngIf="emailErrors?.['required']">Въведете имейл!</div>
      <div class="error" *ngIf="emailErrors?.['email']">
        Въведете коректен имейл!
      </div>
    </ng-container>

    <ng-container formGroupName="passGroup">
      <div class="field  password-container">
        <label for="password">Парола</label>
        <input  [type]="passwordIsVisible ? 'text' : 'password'" id="password" name="password" formControlName="password" />
        <fa-icon [icon]="passwordIsVisible ? faEyeSlash : faEye" class="toggle-password"
          (click)="togglePasswordVisibility()"></fa-icon>
      </div>
      <ng-container *ngIf="password?.touched">
        <div class="error" *ngIf="passwordErrors?.['required']">
          Въведете парола!
        </div>
        <div class="error" *ngIf="passwordErrors?.['appPasswordValidator']">
          Паролата трябва да е минимум 6 символа, с поне една главна и една
          малка буква!
        </div>
      </ng-container>

      <div class="field password-container">
        <label for="repeatPassword">Повтори парола</label>
        <input  [type]="repeatPasswordIsVisible ? 'text' : 'password'" id="repeatPassword" name="repeatPassword" formControlName="repeatPassword" />
        <fa-icon [icon]=" repeatPasswordIsVisible ? faEyeSlash : faEye" class="toggle-password"
          (click)="toggleRepeatPasswordVisibility()"></fa-icon>
      </div>
      <ng-container *ngIf="repeatPassword?.touched">
        <div class="error" *ngIf="repeatPasswordErrors?.['matchPasswordsValidator']">
          Двете пароли трябва да съвпаднат!
        </div>
      </ng-container>
    </ng-container>

    <div class="field">
      <input type="submit" class="submit" value="Регистрирай се" />
    </div>
    <div class="field center">
      <span>Имате ли профил? <a [routerLink]="'/login'">Вход</a></span>
    </div>
    <div>{{ errorMessage }}</div>
  </form>
</div>
